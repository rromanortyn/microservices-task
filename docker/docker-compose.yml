name: microservices-task
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia/
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  user-service-postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_PASSWORD=${USER_SERVICE_DATABASE_PASSWORD}
      - POSTGRES_USER=${USER_SERVICE_DATABASE_USER}
      - POSTGRES_DB=${USER_SERVICE_DATABASE_NAME}
    container_name: user-service-postgres
    ports:
      - ${USER_SERVICE_DATABASE_PORT_OUTER}:${USER_SERVICE_DATABASE_PORT_INNER}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - user-service-db-data:/var/lib/postgresql
    networks:
      - default
  
  vehicle-service-postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_PASSWORD=${VEHICLE_SERVICE_DATABASE_PASSWORD}
      - POSTGRES_USER=${VEHICLE_SERVICE_DATABASE_USER}
      - POSTGRES_DB=${VEHICLE_SERVICE_DATABASE_NAME}
    container_name: vehicle-service-postgres
    ports:
      - ${VEHICLE_SERVICE_DATABASE_PORT_OUTER}:${VEHICLE_SERVICE_DATABASE_PORT_INNER}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - vehicle-service-db-data:/var/lib/postgresql
    networks:
      - default

volumes:
  rabbitmq_data:
  user-service-db-data:
  vehicle-service-db-data:

networks:
  default:
    name: microservices-task-network
